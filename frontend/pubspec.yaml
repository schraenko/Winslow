name: winslow
description: Projektsuite für agiles und klassisches Projektmanagement.

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.0.0

  # HTTP
  dio: ^5.4.0

  # Local Storage
  drift: ^2.17.0
  sqlite3_flutter_libs: ^0.5.0

  # Utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  freezed: ^2.4.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
